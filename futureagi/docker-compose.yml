  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   working_dir: /app/backend
  #   volumes:
  #     - '.:/app/backend'
  #   env_file:
  #     - .env
  #   environment:
  #     - SERVICE_TYPE=worker
  #     - CELERY_QUEUE=trace_ingestion
  #   depends_on:
  #     - rabbitmq
