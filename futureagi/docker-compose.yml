  # ===========================================
  # Databases
  # ===========================================

  db:
    image: postgres:16
    container_name: postgres
    restart: always
    command: >
      postgres
      -c wal_level=logical
      -c max_wal_senders=25
      -c max_replication_slots=25
    environment:
      POSTGRES_PASSWORD: ${PG_PASSWORD:-password}
      POSTGRES_USER: ${PG_USER:-user}
      POSTGRES_DB: ${PG_DB:-tfc}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - database-data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-user} -d ${PG_DB:-tfc}"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgbouncer:
    image: edoburu/pgbouncer:1.18.0
    container_name: pgbouncer
    ports:
      - "6432:6432"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini
      - ./config/userlist.txt:/etc/pgbouncer/userlist.txt

  clickhouse:
    image: clickhouse/clickhouse-server:24.10.2.80
    container_name: clickhouse
    ports:
      - "${CH_HTTP_PORT:-8123}:8123"
      - "${CH_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - ./config/clickhouse/config.xml:/etc/clickhouse-server/config.d/custom.xml:ro
      - ./config/clickhouse/users.xml:/etc/clickhouse-server/users.d/custom.xml:ro
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Message Queue & Cache
  # ===========================================

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-user}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-password}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # Object Storage
  # ===========================================

  minio:
    image: minio/minio:RELEASE.2025-02-07T23-21-09Z
    container_name: minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9005}:9000"
      - "${MINIO_CONSOLE_PORT:-9006}:9001"
    command: server /data --console-address ":9001"

  # ===========================================
  # Docker Proxy (for container orchestration)
  # ===========================================

  docker-proxy:
    image: alpine/socat
    container_name: docker-proxy
    command: -t 900 TCP-LISTEN:2375,fork,reuseaddr UNIX-CONNECT:/var/run/docker.sock
    ports:
      - "2375"
    user: root
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock

  # ===========================================
  # Temporal Services
  # ===========================================

  temporal:
    image: temporalio/auto-setup:1.29.1
    container_name: temporal
    ports:
      - "${TEMPORAL_PORT:-7233}:7233"
    environment:
      - DB=postgres12
      - DB_PORT=${PG_PORT:-5432}
      - POSTGRES_USER=${PG_USER:-user}
      - POSTGRES_PWD=${PG_PASSWORD:-password}
      - POSTGRES_SEEDS=db
      - DBNAME=${PG_DB:-tfc}
      - ENABLE_ES=false
      - LOG_LEVEL=${TEMPORAL_LOG_LEVEL:-info}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x temporal-server"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  temporal-admin-tools:
    image: temporalio/admin-tools
    container_name: temporal-admin-tools
    environment:
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    stdin_open: true
    tty: true
    depends_on:
      temporal:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.43.3
    container_name: temporal-ui
    ports:
      - "${TEMPORAL_UI_PORT:-8085}:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:3000,http://localhost:8000
    depends_on:
      temporal:
        condition: service_healthy

  # ===========================================
  # Temporal Workers - one per queue (production)
  # For dev with single worker, use:
  #   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
  # ===========================================

  temporal-worker:
    platform: linux/amd64
    container_name: temporal-worker-default
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=default
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_DEFAULT_MAX_ACTIVITIES:-100}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_DEFAULT_MAX_WORKFLOWS:-100}
      - TEMPORAL_TARGET_MEMORY_USAGE=${TEMPORAL_TARGET_MEMORY_USAGE:-}
      - TEMPORAL_TARGET_CPU_USAGE=${TEMPORAL_TARGET_CPU_USAGE:-}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  temporal-worker-tasks-l:
    platform: linux/amd64
    container_name: temporal-worker-tasks-l
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=tasks_l
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_TASKS_L_MAX_ACTIVITIES:-50}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_TASKS_L_MAX_WORKFLOWS:-50}
      - TEMPORAL_TARGET_MEMORY_USAGE=${TEMPORAL_TARGET_MEMORY_USAGE:-}
      - TEMPORAL_TARGET_CPU_USAGE=${TEMPORAL_TARGET_CPU_USAGE:-}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  temporal-worker-tasks-xl:
    platform: linux/amd64
    container_name: temporal-worker-tasks-xl
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=tasks_xl
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_TASKS_XL_MAX_ACTIVITIES:-10}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_TASKS_XL_MAX_WORKFLOWS:-20}
      - TEMPORAL_TARGET_MEMORY_USAGE=${TEMPORAL_TARGET_MEMORY_USAGE:-}
      - TEMPORAL_TARGET_CPU_USAGE=${TEMPORAL_TARGET_CPU_USAGE:-}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  temporal-worker-tasks-s:
    platform: linux/amd64
    container_name: temporal-worker-tasks-s
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=tasks_s
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_TASKS_S_MAX_ACTIVITIES:-200}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_TASKS_S_MAX_WORKFLOWS:-200}
      - TEMPORAL_TARGET_MEMORY_USAGE=${TEMPORAL_TARGET_MEMORY_USAGE:-}
      - TEMPORAL_TARGET_CPU_USAGE=${TEMPORAL_TARGET_CPU_USAGE:-}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  temporal-worker-trace-ingestion:
    platform: linux/amd64
    container_name: temporal-worker-trace-ingestion
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=trace_ingestion
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_TRACE_MAX_ACTIVITIES:-100}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_TRACE_MAX_WORKFLOWS:-100}
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  temporal-worker-agent-compass:
    platform: linux/amd64
    container_name: temporal-worker-agent-compass
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=temporal-worker
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - TEMPORAL_TASK_QUEUE=agent_compass
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - TEMPORAL_MAX_CONCURRENT_ACTIVITIES=${TEMPORAL_COMPASS_MAX_ACTIVITIES:-50}
      - TEMPORAL_MAX_CONCURRENT_WORKFLOW_TASKS=${TEMPORAL_COMPASS_MAX_WORKFLOWS:-50}
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Docs Agent (MCP server for documentation search)
  # NOTE: Requires ../new-landing-page/docs-agent to have a Dockerfile.
  #       If running separately, set DOCS_AGENT_URL in backend .env.
  # ===========================================

  # docs-agent:
  #   build:
  #     context: ../../new-landing-page/docs-agent
  #     dockerfile: Dockerfile
  #   container_name: docs-agent
  #   ports:
  #     - "${DOCS_AGENT_PORT:-3002}:3002"
  #   environment:
  #     - DATABASE_URL=postgresql://docsagent:docsagent_dev@docs-agent-db:5432/docsagent
  #     - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
  #     - OPENAI_API_KEY=${OPENAI_API_KEY:-}
  #     - DOCS_AGENT_API_KEY=${DOCS_AGENT_API_KEY:-falcon-docs-secret-key-change-in-prod}
  #     - MCP_TRANSPORT=http
  #     - MCP_PORT=3002
  #     - DOCS_BASE_URL=https://docs.futureagi.com
  #   depends_on:
  #     - docs-agent-db
  #   restart: unless-stopped

  # docs-agent-db:
  #   image: pgvector/pgvector:pg16
  #   container_name: docs-agent-db
  #   environment:
  #     POSTGRES_USER: docsagent
  #     POSTGRES_PASSWORD: docsagent_dev
  #     POSTGRES_DB: docsagent
  #   volumes:
  #     - docs-agent-db-data:/var/lib/postgresql/data
  #   restart: unless-stopped

  # PeerDB CDC (PostgreSQL -> ClickHouse)
  #
  # After services are up, configure mirrors:
  #   ./scripts/peerdb-setup-mirrors.sh
  #
  # PeerDB UI: http://localhost:3001
  # ===========================================

  peerdb-catalog:
    image: postgres:16-alpine
    container_name: peerdb-catalog
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - peerdb-catalog-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  peerdb-temporal:
    image: temporalio/auto-setup:1.29
    container_name: peerdb-temporal
    restart: unless-stopped
    depends_on:
      peerdb-catalog:
        condition: service_healthy
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=peerdb-catalog
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
    volumes:
      - ./config/peerdb/temporal-dynamicconfig.yaml:/etc/temporal/config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD-SHELL", "pgrep -x temporal-server"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  peerdb-flow-api:
    image: ghcr.io/peerdb-io/flow-api:stable-v0.36.9
    container_name: peerdb-flow-api
    restart: unless-stopped
    environment:
      <<: [*peerdb-catalog-config, *peerdb-flow-env, *peerdb-minio-config]
      PEERDB_ALLOWED_TARGETS:
    depends_on:
      peerdb-temporal:
        condition: service_healthy

  peerdb-flow-worker:
    image: ghcr.io/peerdb-io/flow-worker:stable-v0.36.9
    container_name: peerdb-flow-worker
    restart: unless-stopped
    environment:
      <<: [*peerdb-catalog-config, *peerdb-flow-env, *peerdb-minio-config]
    depends_on:
      peerdb-temporal:
        condition: service_healthy

  peerdb-flow-snapshot-worker:
    image: ghcr.io/peerdb-io/flow-snapshot-worker:stable-v0.36.9
    container_name: peerdb-flow-snapshot-worker
    restart: unless-stopped
    environment:
      <<: [*peerdb-catalog-config, *peerdb-flow-env, *peerdb-minio-config]
    depends_on:
      peerdb-temporal:
        condition: service_healthy

  peerdb-server:
    image: ghcr.io/peerdb-io/peerdb-server:stable-v0.36.9
    container_name: peerdb-server
    stop_signal: SIGINT
    restart: unless-stopped
    environment:
      <<: *peerdb-catalog-config
      PEERDB_PASSWORD: peerdb
      PEERDB_FLOW_SERVER_ADDRESS: grpc://peerdb-flow-api:8112
      RUST_LOG: info
    ports:
      - "${PEERDB_PORT:-9900}:9900"
    depends_on:
      peerdb-catalog:
        condition: service_healthy

  peerdb-ui:
    image: ghcr.io/peerdb-io/peerdb-ui:stable-v0.36.9
    container_name: peerdb-ui
    restart: unless-stopped
    ports:
      - "${PEERDB_UI_PORT:-3001}:3000"
    environment:
      <<: *peerdb-catalog-config
      PEERDB_FLOW_SERVER_HTTP: http://peerdb-flow-api:8113
      NEXTAUTH_SECRET: peerdb-local-dev
      NEXTAUTH_URL: http://localhost:${PEERDB_UI_PORT:-3001}
      PEERDB_ALLOWED_TARGETS:
      PEERDB_CLICKHOUSE_ALLOWED_DOMAINS:
    depends_on:
      - peerdb-flow-api

  peerdb-temporal-init:
    image: temporalio/admin-tools
    container_name: peerdb-temporal-init
    restart: "no"
    depends_on:
      peerdb-temporal:
        condition: service_healthy
    environment:
      - TEMPORAL_CLI_ADDRESS=peerdb-temporal:7233
    entrypoint: >
      /bin/sh -c "
      echo 'Registering MirrorName search attribute...' &&
      echo Y | tctl admin cluster add-search-attributes --name MirrorName --type Text 2>/dev/null;
      echo 'Done (may already exist)'
      "

  peerdb-init:
    image: postgres:16-alpine
    container_name: peerdb-init
    restart: "no"
    depends_on:
      peerdb-temporal-init:
        condition: service_completed_successfully
      peerdb-server:
        condition: service_started
      peerdb-flow-api:
        condition: service_started
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    environment:
      - SRC_PG_HOST=db
      - SRC_PG_PORT=5432
      - SRC_PG_USER=${PG_USER:-user}
      - SRC_PG_PASSWORD=${PG_PASSWORD:-password}
      - SRC_PG_DB=${PG_DB:-tfc}
      - DST_CH_HOST=clickhouse
      - DST_CH_PORT=9000
      - DST_CH_USER=default
      - DST_CH_PASSWORD=
      - DST_CH_DB=${CH_DATABASE:-default}
      - PEERDB_HOST=peerdb-server
      - PEERDB_PORT=9900
    volumes:
      - ./scripts/peerdb-setup-mirrors.sh:/setup.sh:ro
    entrypoint: ["bash", "/setup.sh"]

  peerdb-minio:
    image: minio/minio:latest
    container_name: peerdb-minio
    restart: unless-stopped
    volumes:
      - peerdb-minio-data:/data
    environment:
      MINIO_ROOT_USER: _peerdb_minioadmin
      MINIO_ROOT_PASSWORD: _peerdb_minioadmin
    entrypoint: >
      /bin/sh -c "
      minio server /data --console-address=:36987 &
      sleep 2;
      mc alias set myminiopeerdb http://localhost:9000 _peerdb_minioadmin _peerdb_minioadmin;
      mc mb --ignore-existing myminiopeerdb/peerdbbucket;
      wait
      "

# ===========================================
# Volumes
# ===========================================

volumes:
  database-data:
    driver: local
  rabbitmq_data:
    driver: local
  clickhouse_data:
    driver: local
  redis_data:
    driver: local
  docs-agent-db-data:
    driver: local
  peerdb-catalog-data:
    driver: local
  peerdb-minio-data:
    driver: local

# ===========================================
# Networks
# ===========================================

networks:
  default:
    name: futureagi-network
    driver: bridge
