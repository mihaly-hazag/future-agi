name: core-backend

# ===========================================
# PeerDB shared config (YAML anchors)
# ===========================================

x-peerdb-minio-config: &peerdb-minio-config
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ACCESS_KEY_ID: _peerdb_minioadmin
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_SECRET_ACCESS_KEY: _peerdb_minioadmin
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_REGION: us-east-1
  PEERDB_CLICKHOUSE_AWS_CREDENTIALS_AWS_ENDPOINT_URL_S3: http://peerdb-minio:9000
  PEERDB_CLICKHOUSE_AWS_S3_BUCKET_NAME: peerdbbucket

x-peerdb-catalog-config: &peerdb-catalog-config
  PEERDB_CATALOG_HOST: peerdb-catalog
  PEERDB_CATALOG_PORT: 5432
  PEERDB_CATALOG_USER: postgres
  PEERDB_CATALOG_PASSWORD: postgres
  PEERDB_CATALOG_DATABASE: postgres

x-peerdb-flow-env: &peerdb-flow-env
  TEMPORAL_HOST_PORT: peerdb-temporal:7233
  TEMPORAL_CLIENT_CERT:
  TEMPORAL_CLIENT_KEY:
  PEERDB_TEMPORAL_NAMESPACE: default
  AWS_ACCESS_KEY_ID:
  AWS_SECRET_ACCESS_KEY:
  AWS_REGION:
  AWS_ENDPOINT:

services:
  # ===========================================
  # Core Application Services
  # ===========================================

  backend:
    platform: linux/amd64
    container_name: backend
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /app/backend
    ports:
      - "${BACKEND_PORT:-8000}:80"
      - "5555:5555"
      - "8888:8888"
      - "50051:50051"
    volumes:
      - '.:/app/backend'
    env_file:
      - .env
    environment:
      - SERVICE_TYPE=backend
      - DOCS_AGENT_URL=${DOCS_AGENT_URL}
      - DOCS_AGENT_API_KEY=${DOCS_AGENT_API_KEY:-falcon-docs-secret-key-change-in-prod}
      - TEMPORAL_HOST=temporal:7233
      - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
      - FAST_STARTUP=${FAST_STARTUP:-true}
      - AGENTCC_INTERNAL_URL=http://agentcc-gateway:8090
      - AGENTCC_INTERNAL_API_KEY=${AGENTCC_INTERNAL_API_KEY:-}
      # Read replica: uncomment to test read/write split locally (points to same DB)
      # - PGBOUNCER_READ_HOST=pgbouncer
      # - PGBOUNCER_READ_PORT=6432
    depends_on:
      pgbouncer:
        condition: service_started
      temporal:
        condition: service_healthy
      db:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy

  serving:
    platform: linux/amd64
    container_name: serving
    build:
      context: model_serving/
      dockerfile: Dockerfile
    working_dir: /app/embedding
    ports:
      - "${SERVING_PORT:-8080}:8080"
    env_file:
      - .env
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./model_serving:/app/embedding

  # ===========================================
  # agentcc Gateway (LLM Proxy)
  # ===========================================

  agentcc-gateway:
    container_name: agentcc-gateway
    build:
      context: ../agentcc-gateway
      dockerfile: Dockerfile
    ports:
      - "${AGENTCC_GATEWAY_PORT:-8090}:8090"
    volumes:
      - ../${AGENTCC_CONFIG_PATH:-agentcc-gateway/config.example.yaml}:/app/config.yaml:ro
      - ${GOOGLE_APPLICATION_CREDENTIALS:-/dev/null}:/app/Vertex_AI_Creds.json:ro
    env_file:
      - .env
    environment:
      - AGENTCC_INTERNAL_API_KEY=${AGENTCC_INTERNAL_API_KEY:-}
      # Gateway WORKDIR is /, so credentials_file resolution needs an absolute
      # path. Override the relative value from .env.
      - GOOGLE_APPLICATION_CREDENTIALS=/app/Vertex_AI_Creds.json
      # Provider creds for the gateway live in agentcc-gateway/config.yaml,
      # which interpolates ${ENV_VAR}s from .env at start. Anything in .env is
      # already passed through via env_file above — no per-provider entries
      # needed here. See INSTALLATION.md → "Vertex AI" for the bearer-token
      # pattern and the warning about mounting Vertex_AI_Creds.json.
    restart: unless-stopped

  # Sandboxed code executor — nsjail-based isolation for eval code
  code-executor:
    platform: linux/amd64
    container_name: code-executor
    build:
      context: ./code-executor
      dockerfile: Dockerfile
    ports:
      - "8060:8060"
    # Privileged needed for nsjail namespace creation
    privileged: true
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '2'

  # ===========================================
  # Celery Workers (commented - using Temporal instead)
  # ===========================================

  # celery-beat:
  #   platform: linux/amd64
  #   container_name: celery-beat
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   working_dir: /app/backend
