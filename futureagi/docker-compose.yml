  #   working_dir: /app/backend
  #   volumes:
  #     - '.:/app/backend'
  #   env_file:
  #     - .env
  #   environment:
  #     - SERVICE_TYPE=worker
  #     - CELERY_QUEUE=celery
  #     - TEMPORAL_HOST=temporal:7233
  #     - TEMPORAL_NAMESPACE=${TEMPORAL_NAMESPACE:-default}
  #     - FAST_STARTUP=${FAST_STARTUP:-true}
  #   depends_on:
  #     - rabbitmq
