  # celery-worker-tasks-xl:
  #   platform: linux/amd64
  #   container_name: celery-worker-tasks-xl
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   working_dir: /app/backend
  #   volumes:
  #     - '.:/app/backend'
  #   env_file:
  #     - .env
  #   environment:
  #     - SERVICE_TYPE=worker
  #     - CELERY_QUEUE=tasks_xl
  #   depends_on:
  #     - rabbitmq
  #     - db

  # celery-worker-tasks-l:
  #   platform: linux/amd64
  #   container_name: celery-worker-tasks-l
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   working_dir: /app/backend
  #   volumes:
  #     - '.:/app/backend'
  #   env_file:
  #     - .env
  #   environment:
  #     - SERVICE_TYPE=worker
